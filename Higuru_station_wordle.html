<style>
body{

h1{

}

#message{
    height:28px;
    color:#d33;
    font-weight:bold;
    margin-bottom:12px;
}

#board{
    display:flex;
    flex-direction:column;
    gap:8px;
    align-items:center;
    margin-bottom:24px;
}

.row{
    display:flex;
    gap:6px;
}

.cell{
    width:48px;
    height:48px;
    border:2px solid #bbb;
    background:white;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:bold;
}

.correct{
    background:#6aaa64 !important;
    border-color:#6aaa64 !important;
    color:white !important;
}

.present{
    background:#c9b458 !important;
    border-color:#c9b458 !important;
    color:white !important;
}

.absent{
    background:#999 !important;
    border-color:#999 !important;
    color:white !important;
}

.close{
    background:#9b59ff !important;
    border-color:#9b59ff !important;
    color:white !important;
}

#keyboard{
    width:max-content;
    margin:0 auto 30px;
}

.control-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.keyrow{
    display:flex;
    justify-content:flex-start;
    gap:6px;
    margin-bottom:8px;
}

.key{
    width:50px;
    height:50px;
    border-radius:6px;
    border:1px solid #bbb;
    background:white;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    color:#222;
}

.key.large{
    width:140px;
    font-size:18px;
}

.space{
    width:50px;
    height:50px;
}

.hidden{
    display:none;
}
</style>
</head>

let unused = [...stations];
let answer = "";
let attempt = 0;
let current = "";
let specialMode = false;

const board = document.getElementById("board");
const keyboard = document.getElementById("keyboard");
const message = document.getElementById("message");
const resultScreen = document.getElementById("resultScreen");
const resultTitle = document.getElementById("resultTitle");
const resultStation = document.getElementById("resultStation");
const resultReading = document.getElementById("resultReading");
const resultLine = document.getElementById("resultLine");
document.getElementById("nextButton").onclick = ()=>{
  resultScreen.classList.add("hidden");
  resultScreen.style.display = "";
  resetKeyboard();
  pickAnswer();
};

function pickAnswer(){

    if(unused.length===0){
        unused = [...stations];
    }

    const idx = Math.floor(Math.random()*unused.length);

    answer = unused[idx];
    unused.splice(idx,1);

    attempt = 0;
    current = "";

    board.innerHTML = "";

    for(let r=0;r<6;r++){

        const row = document.createElement("div");
        row.className = "row";

        for(let i=0;i<answer.length;i++){

            const cell = document.createElement("div");
            cell.className = "cell";

            row.appendChild(cell);
        }

        board.appendChild(row);
    }

    console.log(answer);
}

function buildKeyboard(){

    keyboard.innerHTML = "";

    const controlRow = document.createElement("div");
    controlRow.className = "control-row";

    const switchBtn = createControl("゛゜小 ー", ()=>{
        specialMode = !specialMode;
        document.getElementById("normal").classList.toggle("hidden");
        document.getElementById("special").classList.toggle("hidden");
    });

    const delBtn = createControl("削除", backspace);
    const enterBtn = createControl("決定", submitGuess);

    controlRow.appendChild(switchBtn);
    controlRow.appendChild(delBtn);
    controlRow.appendChild(enterBtn);

    keyboard.appendChild(controlRow);

    createPage(normalLayout,"normal");
    createPage(specialLayout,"special");
}

function createPage(layout,id){

    const wrap = document.createElement("div");
    wrap.id = id;

    if(id==="special"){
        wrap.classList.add("hidden");
    }

    layout.forEach(line=>{

        const row = document.createElement("div");
        row.className = "keyrow";

        line.forEach(ch=>{

            if(ch===" "){
                const sp = document.createElement("div");
                sp.className = "space";
                row.appendChild(sp);
            }
            else{
                row.appendChild(createKey(ch));
            }
        });

        wrap.appendChild(row);
    });

    keyboard.appendChild(wrap);
}

function createKey(ch){

    const btn = document.createElement("button");

    btn.className = "key";
    btn.textContent = ch;
    btn.dataset.key = ch;

    btn.onclick = ()=>{

        if(current.length >= answer.length) return;

        const row = board.children[attempt];

        row.children[current.length].textContent = ch;

        current += ch;
    };

    return btn;
}

function createControl(text,fn){

    const btn = document.createElement("button");

    btn.className = "key large";
    btn.textContent = text;
    btn.onclick = fn;

    return btn;
}

function backspace(){

    if(current.length===0) return;

    const row = board.children[attempt];

    row.children[current.length-1].textContent = "";

    current = current.slice(0,-1);
}

function normalizeKana(ch){

    const map = {
        "ぁ":"あ","ぃ":"い","ぅ":"う","ぇ":"え","ぉ":"お",
        "ゃ":"や","ゅ":"ゆ","ょ":"よ","っ":"つ",
        "が":"か","ぎ":"き","ぐ":"く","げ":"け","ご":"こ",
        "ざ":"さ","じ":"し","ず":"す","ぜ":"せ","ぞ":"そ",
        "だ":"た","ぢ":"ち","づ":"つ","で":"て","ど":"と",
        "ば":"は","び":"ひ","ぶ":"ふ","べ":"へ","ぼ":"ほ",
        "ぱ":"は","ぴ":"ひ","ぷ":"ふ","ぺ":"へ","ぽ":"ほ",
        "ゔ":"う"
    };

    return map[ch] || ch;
}

function isClose(a,b){

    return normalizeKana(a)===normalizeKana(b)
        && a!==b;
}

const priority = {
    absent:1,
    present:2,
    close:3,
    correct:4
};

function updateKeyColor(ch,state){

    const keys = document.querySelectorAll(".key");

    keys.forEach(key=>{

        if(key.dataset.key===ch){

            let currentState = "";

            if(key.classList.contains("correct")) currentState="correct";
            else if(key.classList.contains("close")) currentState="close";
            else if(key.classList.contains("present")) currentState="present";
            else if(key.classList.contains("absent")) currentState="absent";

            if(priority[currentState] > priority[state]){
                return;
            }

            key.classList.remove(
                "correct",
                "present",
                "absent",
                "close"
            );

            key.classList.add(state);
        }
    });
}

function submitGuess(){

    if(current.length < 5){
        message.textContent = "5文字入力してください";
        return;
    }

    if(current.length !== answer.length){
        message.textContent = answer.length + "文字の駅名を入力してください";
        return;
    }

    if(!stations.includes(current)){

        message.textContent = "存在しない駅名です";
        return;
    }

    const previousGuesses = [];

    for(let r=0;r<attempt;r++){

        let guess = "";
        const row = board.children[r];

        for(let c=0;c<answer.length;c++){
            guess += row.children[c].textContent;
        }

        previousGuesses.push(guess);
    }

    if(previousGuesses.includes(current)){

        message.textContent = "同じ駅名は入力できません";
        return;
    }

    message.textContent = "";

    const row = board.children[attempt];

    for(let i=0;i<answer.length;i++){

        const cell = row.children[i];
        const ch = current[i];

        if(ch===answer[i]){

            cell.classList.add("correct");
            updateKeyColor(ch,"correct");
        }
        else if(isClose(ch,answer[i])){

            cell.classList.add("close");
            updateKeyColor(ch,"close");
        }
        else if(answer.includes(ch)){

            cell.classList.add("present");
            updateKeyColor(ch,"present");
        }
        else{

            cell.classList.add("absent");
            updateKeyColor(ch,"absent");
        }
    }

    if(current===answer){
        setTimeout(()=>{
            showResult(true);
        },800);
        return;
    }

    attempt++;
    current = "";

    if(attempt>=6){
        setTimeout(()=>{
            showResult(false);
        },1000);
    }
}

function setResultBorder(lineText){
    const card = document.getElementById("resultCard");
    const aliases = {
      "陽来国有鉄道南北線": "陽来国有鉄道菅谷線"
    };

    const lines = lineText.split("・")
      .map(s => s.trim())
      .filter(Boolean)
      .map(line => aliases[line] || line);

    const colors = [...new Set(lines.map(line => lineColors[line] || "#cccccc"))];

    if(colors.length === 1){
        card.style.border = "8px solid " + colors[0];
        card.style.backgroundImage = "none";
    } else {
        card.style.border = "8px solid transparent";
        const step = 100 / colors.length;
        const parts = colors.map((color, i) => {
            const start = (i * step).toFixed(4);
            const end = ((i + 1) * step).toFixed(4);
            return `${color} ${start}%, ${color} ${end}%`;
        });
        card.style.backgroundImage =
            "linear-gradient(white, white), linear-gradient(90deg, " + parts.join(", ") + ")";
        card.style.backgroundOrigin = "padding-box, border-box";
        card.style.backgroundClip = "padding-box, border-box";
    }
}

function showResult(isCorrect){
    const info = stationInfo[answer] || {kanji: answer, reading: answer, line: ""};
    resultTitle.textContent = isCorrect ? "正解！" : "正解は";
    resultStation.textContent = info.kanji;
    resultReading.textContent = "（" + info.reading + "）";
    resultLine.textContent = info.line;
    setResultBorder(info.line);
    resultScreen.classList.remove("hidden");
    resultScreen.style.display = "flex";
}

function resetKeyboard(){

    document.querySelectorAll(".key").forEach(key=>{

        if(key.dataset.key){

            key.classList.remove(
                "correct",
                "present",
                "absent",
                "close"
            );
        }
    });
}
